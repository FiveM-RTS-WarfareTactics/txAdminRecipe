$engine: 3
$onesync: on
name: "FiveM RTS: Warfare Tactics V by Enyo Scripts"
version: 2.1.0
author: EnyoScripts
description: FiveM standalone RTS game mode. Platoon-based combat, 5 battlefield maps, 24 unit types, CPU AI opponents, SBMM matchmaking & anti-cheat containment.

tasks:
  # Prepare Database
  - action: connect_database

  # Download recipe assets
  - action: download_github
    dest: ./tmp/recipe
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/txAdminRecipe

  - action: move_path
    src: ./tmp/recipe/server.cfg
    dest: ./server.cfg

  - action: move_path
    src: ./tmp/recipe/rts-logo.png
    dest: ./myLogo.png

  # Download CFX default resources (sessionmanager, baseevents, hardcap, yarn)
  - action: download_github
    src: https://github.com/citizenfx/cfx-server-data
    subpath: resources
    dest: ./resources/[cfx-default]

  # Strip unwanted default resources
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/chat-theme-gtao
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/basic-gamemode
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/mapmanager
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/spawnmanager
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/money
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/money-fountain
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/money-fountain-example-map
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/ped-money-drops
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/player-data
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/playernames
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/runcode
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/fivem-map-hipster
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/fivem-map-skater
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/example-loadscreen
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/redm-map-one
  - action: remove_path
    path: ./resources/[cfx-default]/[gameplay]/sessionmanager-rdr3
  - action: remove_path
    path: ./resources/[cfx-default]/[local]/rconlog
  - action: remove_path
    path: ./resources/[cfx-default]/[local]/fivem

  # Download RTS Framework repos
  - action: download_github
    dest: ./resources/[rts]/enyo-rts
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/enyo-rts

  - action: waste_time
    seconds: 3

  - action: download_github
    dest: ./resources/[rts]/rts-admin
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/rts-admin

  - action: waste_time
    seconds: 3

  - action: download_github
    dest: ./resources/[rts]/rts-mapbuilder
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/rts-mapbuilder

  - action: waste_time
    seconds: 3

  - action: download_github
    dest: ./resources/[rts]/rts-maps
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/rts-maps

  - action: waste_time
    seconds: 3

  - action: download_github
    dest: ./resources/[rts]/rts-weapons
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/rts-weapons

  - action: waste_time
    seconds: 3

  - action: download_github
    dest: ./resources/[rts]/minimap
    ref: main
    src: https://github.com/FiveM-RTS-WarfareTactics/minimap

  - action: waste_time
    seconds: 3

  # Download dependencies
  - action: download_file
    path: ./tmp/oxmysql.zip
    url: https://github.com/overextended/oxmysql/releases/latest/download/oxmysql.zip
  - action: unzip
    dest: ./resources/[standalone]
    src: ./tmp/oxmysql.zip

  - action: download_github
    dest: ./resources/[standalone]/screenshot-basic
    ref: master
    src: https://github.com/citizenfx/screenshot-basic

  - action: download_github
    dest: ./resources/[standalone]/bob74_ipl
    ref: master
    src: https://github.com/Bob74/bob74_ipl

  - action: waste_time
    seconds: 5

  # Clean up temp files
  - action: remove_path
    path: ./tmp
